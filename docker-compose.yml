services:
  postgres:
    image: postgres:16-alpine
    container_name: austro-postgres
    environment:
      POSTGRES_DB: austro_credit
      POSTGRES_USER: austro
      POSTGRES_PASSWORD: austro_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U austro -d austro_credit"]
      interval: 10s
      timeout: 5s
      retries: 5

  risk-service:
    build:
      context: ./services/risk-service
    container_name: austro-risk-service
    ports:
      - "8081:8081"
    environment:
      QUARKUS_HTTP_PORT: 8081

  orchestrator-service:
    build:
      context: ./services/orchestrator-service
    container_name: austro-orchestrator-service
    depends_on:
      postgres:
        condition: service_healthy
      risk-service:
        condition: service_started
    ports:
      - "18080:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/austro_credit
      QUARKUS_DATASOURCE_USERNAME: austro
      QUARKUS_DATASOURCE_PASSWORD: austro_pass
      RISK_SERVICE_URL: http://risk-service:8081

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:18080
    container_name: austro-frontend
    depends_on:
      - orchestrator-service
    ports:
      - "5173:80"

volumes:
  postgres-data:
